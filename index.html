<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eureka Springs Trip Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1f2722;
      --pine: #183328;
      --forest: #28533f;
      --sage: #7b9a83;
      --sand: #f6efe4;
      --paper: rgba(255, 252, 247, 0.92);
      --gold: #c78f37;
      --river: #2f7fb0;
      --plum: #7b5bb7;
      --shadow: 0 22px 50px rgba(20, 31, 25, 0.16);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Jost", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(199, 143, 55, 0.16), transparent 25%),
        radial-gradient(circle at bottom left, rgba(47, 127, 176, 0.12), transparent 24%),
        linear-gradient(180deg, #edf3ee 0%, #f7f1e8 100%);
    }

    .shell {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      padding: 28px 22px 26px;
      color: #fff;
      background:
        radial-gradient(circle at 85% 15%, rgba(199, 143, 55, 0.2), transparent 24%),
        linear-gradient(135deg, var(--pine), var(--forest));
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.5;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      text-align: center;
    }

    h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2rem, 6vw, 3.7rem);
      line-height: 0.92;
      margin-bottom: 0;
      max-width: none;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      text-decoration: none;
      color: inherit;
      border-radius: 24px;
      padding: 18px;
      background: var(--paper);
      box-shadow: var(--shadow);
      min-height: 170px;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      justify-content: center;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 26px 56px rgba(20, 31, 25, 0.2);
    }

    .card.disabled {
      cursor: default;
      opacity: 0.88;
    }

    .icon {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.65rem;
      color: #fff;
    }

    .icon.honeymoon { background: linear-gradient(135deg, #c78f37, #d7a85b); }
    .icon.fishing { background: linear-gradient(135deg, #2f7fb0, #3e9ac9); }
    .icon.hiking { background: linear-gradient(135deg, #4a8b5b, #6aa177); }

    .card h2 {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.35rem;
      line-height: 1.2;
      font-weight: 600;
      text-align: center;
    }

  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-content">
        <h1>Eureka Springs Trip Hub</h1>
      </div>
    </section>

    <section class="grid">
      <a class="card" href="honeymoon-guide.html">
        <div class="icon honeymoon" aria-hidden="true">♡</div>
        <h2>Honeymoon Guide</h2>
      </a>

      <a class="card" href="fishing-map.html">
        <div class="icon fishing" aria-hidden="true">🎣</div>
        <h2>Fishing Map</h2>
      </a>

      <a class="card" href="hiking.html">
        <div class="icon hiking" aria-hidden="true">🥾</div>
        <h2>Hiking Map</h2>
      </a>
    </section>
  </main>
</body>
</html>
